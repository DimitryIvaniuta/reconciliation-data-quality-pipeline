services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: reconciliation
      POSTGRES_USER: reconciliation
      POSTGRES_PASSWORD: reconciliation
    ports: ["5435:5432"]
    volumes: ["postgres_data:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconciliation -d reconciliation"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:8.8-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "reconciliation"]
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "reconciliation", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  kafka:
    image: apache/kafka:4.3.1
    hostname: kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20
  app:
    build: .
    profiles: ["app"]
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/reconciliation
      SPRING_R2DBC_USERNAME: reconciliation
      SPRING_R2DBC_PASSWORD: reconciliation
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/reconciliation
      SPRING_FLYWAY_USER: reconciliation
      SPRING_FLYWAY_PASSWORD: reconciliation
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: reconciliation
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_SECURITY_API_KEY: ${APP_SECURITY_API_KEY:?APP_SECURITY_API_KEY must be set}
      APP_ALERT_WEBHOOK_URL: ${APP_ALERT_WEBHOOK_URL:-}
    ports: ["8080:8080"]
    read_only: true
    tmpfs: ["/tmp"]
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
volumes:
  postgres_data:
  redis_data:
